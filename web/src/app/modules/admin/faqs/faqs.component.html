<mat-card class="page-card">
    <mat-card-content>

        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">FAQ Directory</h2>
                <p class="text-xs text-slate-500">Provide frequently asked questions for customers regarding shipments, payments, policies.</p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">

                <!-- SEARCH -->
                <mat-form-field class="fuse-mat-dense w-full sm:w-72">
                    <mat-icon matPrefix>search</mat-icon>
                    <input matInput placeholder="Search FAQ..." [formControl]="searchControl" autocomplete="off" />
                </mat-form-field>

                <!-- ADD -->
                <button (click)="newRowClicked()" mat-flat-button color="primary" class="rounded-lg">
                    <mat-icon class="mr-2">add</mat-icon>
                    Add FAQ
                </button>

            </div>
        </div>

        <!-- TABLE -->
        <div class="overflow-x-auto">
            <ck-table-grid [properties]="table"></ck-table-grid>
        </div>

    </mat-card-content>
</mat-card>


<!-- ================= DRAWER ================= -->

<fuse-drawer class="z-999 w-screen min-w-screen sm:w-110 sm:min-w-110 p-2" fixed [mode]="'over'"
    [name]="'faqFormTpl'" [position]="'right'" #faqFormTpl>
    <div class="p-4 flex flex-col h-full overflow-y-auto">

        <!-- HEADER -->
        <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
            <div>
                <div class="font-semibold text-2xl text-primary">{{ recordMode === 'C' ? 'Create FAQ' : 'Edit FAQ' }}</div>
                <p class="text-xs text-slate-400">Configure questions and descriptions.</p>
            </div>

            <div class="flex gap-2">
                <button mat-raised-button color="primary" (click)="onSubmitClicked()" [disabled]="inputForm.invalid">
                    <mat-icon class="mr-1">save</mat-icon>
                    Save
                </button>
                <button mat-raised-button color="warn" (click)="onCancelClicked()">
                    <mat-icon class="mr-1">close</mat-icon>
                    Cancel
                </button>
            </div>
        </div>

        <!-- FORM -->
        <form [formGroup]="inputForm" class="flex-grow">

            <div class="grid grid-cols-1 gap-4">

                <!-- QUESTION -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Question</mat-label>
                    <textarea matInput formControlName="faqQns" rows="3" placeholder="e.g. What is the return policy?"></textarea>
                </mat-form-field>

                <!-- ANSWER -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Answer</mat-label>
                    <textarea matInput formControlName="faqAnswer" rows="6" placeholder="Provide complete descriptive details here..."></textarea>
                </mat-form-field>

            </div>

        </form>

    </div>
</fuse-drawer>
