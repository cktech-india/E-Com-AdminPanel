<mat-card class="page-card">
    <mat-card-content>

        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">Customer Wishlists Insights</h2>
                <p class="text-xs text-slate-500">Monitor products added to wishlists by customers for marketing analysis.</p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">

                <!-- SEARCH -->
                <mat-form-field class="fuse-mat-dense w-full sm:w-72">
                    <mat-icon matPrefix>search</mat-icon>
                    <input matInput placeholder="Search Wishlists..." [formControl]="searchControl" autocomplete="off" />
                </mat-form-field>

            </div>
        </div>

        <!-- TABLE -->
        <div class="overflow-x-auto">
            <ck-table-grid [properties]="table"></ck-table-grid>
        </div>

    </mat-card-content>
</mat-card>
