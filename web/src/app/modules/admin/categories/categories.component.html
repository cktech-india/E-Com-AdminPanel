<mat-card class="page-card">
    <mat-card-content>

        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">Categories Management</h2>
                <p class="text-xs text-slate-500">Add or edit product classification categories.</p>
            </div>

            <div class="flex items-center gap-3 w-full sm:w-auto">

                <!-- SEARCH -->
                <mat-form-field class="fuse-mat-dense w-full sm:w-72">
                    <mat-icon matPrefix>search</mat-icon>
                    <input matInput placeholder="Search Category..." [formControl]="searchControl" autocomplete="off" />
                </mat-form-field>

                <!-- IMPORT & EXPORT -->
                <app-data-import-export
                    [columns]="table.columns"
                    [data]="table.gridData"
                    entityName="Category"
                    entityType="category"
                    (onImportComplete)="getGridData()">
                </app-data-import-export>

                <!-- ADD -->
                <button (click)="newRowClicked()" mat-flat-button color="primary" class="rounded-lg">
                    <mat-icon class="mr-2">add</mat-icon>
                    Add Category
                </button>

            </div>
        </div>

        <!-- TABLE -->
        <div class="overflow-x-auto">
            <ck-table-grid [properties]="table"></ck-table-grid>
        </div>

    </mat-card-content>
</mat-card>


<!-- ================= DRAWER ================= -->

<fuse-drawer class="z-999 w-screen min-w-screen sm:w-100 sm:min-w-100 p-2" fixed [mode]="'over'"
    [name]="'categoryFormTpl'" [position]="'right'" #categoryFormTpl>
    <div class="p-4 flex flex-col h-full overflow-y-auto">

        <!-- HEADER -->
        <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
            <div>
                <div class="font-semibold text-2xl text-primary">{{ recordMode === 'C' ? 'Create Category' : 'Edit Category' }}</div>
                <p class="text-xs text-slate-400">Set code identifier and display name.</p>
            </div>

            <div class="flex gap-2">
                <button mat-raised-button color="primary" (click)="onSubmitClicked()" [disabled]="inputForm.invalid">
                    <mat-icon class="mr-1">save</mat-icon>
                    Save
                </button>
                <button mat-raised-button color="warn" (click)="onCancelClicked()">
                    <mat-icon class="mr-1">close</mat-icon>
                    Cancel
                </button>
            </div>
        </div>

        <!-- FORM -->
        <form [formGroup]="inputForm" class="flex-grow">

            <div class="grid grid-cols-1 gap-4">

                <!-- CATEGORY ID -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Category Code / ID</mat-label>
                    <input matInput formControlName="categoryId" [readonly]="recordMode !== 'C'" placeholder="e.g. MANDALA">
                </mat-form-field>

                <!-- CATEGORY NAME -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Category Name</mat-label>
                    <input matInput formControlName="categoryName" placeholder="e.g. Mandala Art Frames">
                </mat-form-field>

                <!-- IMAGE URL -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Image URL</mat-label>
                    <input matInput formControlName="imageUrl" placeholder="e.g. assets/images/category-mandala.jpg">
                </mat-form-field>

                <!-- DESCRIPTION -->
                <mat-form-field appearance="outline" class="w-full">
                    <mat-label>Description</mat-label>
                    <textarea matInput formControlName="description" rows="4" placeholder="Brief details about categories..."></textarea>
                </mat-form-field>

                <!-- ACTIVE -->
                <div class="mt-2">
                    <mat-slide-toggle formControlName="isActive">
                        Active Category?
                    </mat-slide-toggle>
                </div>

            </div>

        </form>

    </div>
</fuse-drawer>
