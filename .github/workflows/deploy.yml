name: UAT Deployment

on:
  push:
    branches: [ development ]

jobs:
  # --- JOB 1: Backend Build ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: build/libs/ecom-admin-service.jar
          retention-days: 1

  # --- JOB 2: Web Frontend Build ---
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build Web
        run: |
          cd web
          npm ci --force
          npx ng build --configuration production
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: web/dist/fuse/browser/
          retention-days: 1

  # --- JOB 3: Deploy (Wait for others to finish) ---
  deploy:
    needs: [build-backend, build-web]
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /opt/apps/ecom-admin-demo
    steps:
      - uses: actions/checkout@v4 # Need for config files

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloads

      - name: Prepare Package
        run: |
          mkdir -p pkg/config/assets pkg/public
          cp downloads/backend-artifact/*.jar pkg/
          cp config/application.properties pkg/config/
          cp -r config/assets/* pkg/config/assets/
          cp -r downloads/web-artifact/* pkg/public/
          tar -czf deploy.tar.gz -C pkg .

      - name: Upload and Execute
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf ${{ env.DEPLOY_DIR }}/public/*
            sudo tar -xzf /tmp/deploy.tar.gz -C ${{ env.DEPLOY_DIR }}
            cd ${{ env.DEPLOY_DIR }}
            sudo chmod +x restart.sh
            sudo ./restart.sh
            rm /tmp/deploy.tar.gz